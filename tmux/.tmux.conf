# Status bar colors
set -g status-style bg=black,fg=white

# Minimal left side
set -g status-left "#[fg=white,bg=black] #S "
set -g status-left-length 20

# Completely empty right side + no padding
set -g status-right ""
set -g status-right-length 0

# Center the window list and remove any remaining gap
set -g status-justify absolute-centre

# Window status format
setw -g window-status-current-format "#[fg=black,bg=white,bold] #I:#W #[default]"
setw -g window-status-format "#[fg=white,bg=black] #I:#W #[default]"

# Position at top
set-option -g status-position top

# Add mouse scroll
set -g mouse on

# Start from window index 1
set -g base-index 1

# === Window switching (no prefix) ===
bind -n C-t new-window -c "#{pane_current_path}"
bind -n M-1 select-window -t :1   # Alt + 1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-0 select-window -t :0

# === Pane navigation with Ctrl + hjkl (no prefix) - Vim style ===
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# === Pane splits with Ctrl + Shift + hjkl ===
bind -n C-S-h split-window -hb -c "#{pane_current_path}"   # new pane LEFT
bind -n C-S-l split-window -h  -c "#{pane_current_path}"   # new pane RIGHT
#bind -n C-S-j split-window -vb -c "#{pane_current_path}"   # new pane ABOVE
bind -n C-S-k split-window -v  -c "#{pane_current_path}"   # new pane BELOW

# Unbind old defaults
unbind %
unbind '"'
